name: Merge main into custom

on:
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: custom
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into custom
        run: |
          git fetch origin main
          if git merge origin/main --no-edit -m "chore: merge upstream sync from main"; then
            git push origin custom
          else
            echo "Merge conflict between main and custom — manual resolution required"
            git merge --abort
            exit 1
          fi
